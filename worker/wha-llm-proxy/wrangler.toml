name = "wha-llm-proxy"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Three provider keys live in Worker secrets; rotate via `wrangler secret put`.
# GROQ_KEY, SAMBANOVA_KEY, ANTHROPIC_KEY are not in this file — secrets only.

[[kv_namespaces]]
binding = "RATELIMIT"
id = "REPLACE_WITH_KV_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"

[[analytics_engine_datasets]]
binding = "JUDGE_ANALYTICS"
dataset = "judge_analytics"

[vars]
PROVIDER_GROQ_URL = "https://api.groq.com/openai/v1/chat/completions"
PROVIDER_SAMBANOVA_URL = "https://api.sambanova.ai/v1/chat/completions"
PROVIDER_ANTHROPIC_URL = "https://api.anthropic.com/v1/messages"
RATE_LIMIT_PER_MIN = "10"
BREAKER_TRIP_THRESHOLD = "3"
BREAKER_PROBE_INTERVAL_MS = "60000"

[observability]
enabled = true
