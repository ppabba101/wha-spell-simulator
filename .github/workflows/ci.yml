name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + unit + integration + bench + e2e
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers (chromium)
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Integration tests (miniflare)
        run: npm run test:integration

      - name: Recognition bench (AC-P1 gate)
        run: npm run bench:recognize

      - name: Playwright e2e (headless)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload bench report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-recognize-report
          path: bench/recognize-report.json
          retention-days: 14
